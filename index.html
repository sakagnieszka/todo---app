<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TODO App</title>

  <style>
    /* === LAYOUT === */
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      margin-top: 50px;
    }
/* === APP === */
    .app {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 350px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    h1 {
      text-align: center;
    }
/* === INPUT === */
    .input-group {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 8px;
    }
/* === BUTTONS === */
    button {
      padding: 8px 10px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background: #4caf50;
      color: white;
      transition: 0.2s;
    }
    button:hover {
        background: #45a049;
    }
    /* === FILTERS === */
 .filters {
      display: flex;
      justify-content: space-around;
      margin-top: 10px;
    }

    .filters button.active {
      font-weight: bold;
      background: #333;
    }
    /* === LIST === */
    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      display: flex;
      justify-content: space-between;
      padding: 8px;
      border-bottom: 1px solid #ddd;
      transition: 0.2s;
    }
    li:hover {
        background: #f0f0f0;
    }

    li.completed span {
      text-decoration: line-through;
      color: gray;
    }

   
    li {
        animation: fadeIn 0.2s ease;
    }
    /* === ANIMATIONS === */
    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(5px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
  </style>
</head>

<body>

<div class="app">
  <h1>TODO</h1>

  <div class="input-group">
    <input type="text" id="taskInput" placeholder="Np. Kup mleko..." />
    <button onclick="addTask()">Dodaj</button>
  </div>

  <div class="filters">
    <button onclick="setFilter('all', this)" class="active">Wszystkie</button>
    <button onclick="setFilter('active', this)">Aktywne</button>
    <button onclick="setFilter('completed', this)">Wykonane</button>
  </div>

  <ul id="taskList"></ul>
</div>

<script>

  let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
  let filter = "all";

  
  function saveTasks() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
  }

  
  function addTask() {
    const input = document.getElementById("taskInput");
    const text = input.value.trim();

    if (!text) return;

    tasks.push({
      id: Date.now(), 
      text,
      completed: false
    });

    input.value = "";
input.focus(); // UX: return focus to input

    saveTasks();
    render();
  }

 // Enter key adds a task
  document.getElementById("taskInput")
    .addEventListener("keypress", e => {
      if (e.key === "Enter") addTask();
    });

  function deleteTask(id) {
    tasks = tasks.filter(task => task.id !== id);
    saveTasks();
    render();
  }

 
  function toggleTask(id) {
    tasks = tasks.map(task =>
      task.id === id
        ? { ...task, completed: !task.completed }
        : task
    );

    saveTasks();
    render();
  }

  function setFilter(type, el) {
    filter = type;

    document.querySelectorAll(".filters button")
      .forEach(btn => btn.classList.remove("active"));

    el.classList.add("active");

    render();
  }

  function getFilteredTasks() {
    if (filter === "active") return tasks.filter(t => !t.completed);
    if (filter === "completed") return tasks.filter(t => t.completed);
    return tasks;
  }

  function render() {
    const list = document.getElementById("taskList");
    list.innerHTML = "";

    getFilteredTasks().forEach(task => {
      const li = document.createElement("li");

    
      if (task.completed) li.classList.add("completed");

      li.innerHTML = `
        <span onclick="toggleTask(${task.id})">${task.text}</span>
        <button onclick="deleteTask(${task.id})">❌</button>
      `;

      list.appendChild(li);
    });
  }

  render();
</script>

</body>
</html>
